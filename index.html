<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Font -->
     <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
     <!-- Bootstrap CSS -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
     <link rel="stylesheet" href="all.css">
     <title>Imma-O-bong | Coming Soon</title>
</head>
<body class="overflow-hidden">
    
     <section class="d-flex justify-content-center align-items-center flex-column space-y-5 py-3 coming">
          <div class="headText">COMING SOON</div>
          <div class="count d-flex justify-content-center align-items-center gap-5 md-gap-1">
               <div class="d-flex justify-content-center align-items-center flex-column gap-2">
                    <span class="month"></span>
                    <span class="texts">Months</span>
               </div>
               <div>:</div>
               <div class="d-flex justify-content-center align-items-center flex-column gap-2">
                    <span class="day"></span>
                    <span class="texts">days</span>
               </div>
               <div>:</div>
               <div class="d-flex justify-content-center align-items-center flex-column gap-2">
                    <span class="hour"></span>
                    <span class="texts">hours</span>
               </div>
               <div>:</div>
               <div class="d-flex justify-content-center align-items-center flex-column gap-2">
                    <span class="min"></span>
                    <span class="texts">mins</span>
               </div>
          </div>
     </section>


      <!-- BootStrap Js -->
      <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
      <!-- Font Awsome -->
      <script src="https://kit.fontawesome.com/2a49fbdbb8.js" crossorigin="anonymous"></script>
      <script>
          // Select the elements by their class names
          const monthElement = document.querySelector('.month');
          const dayElement = document.querySelector('.day');
          const hourElement = document.querySelector('.hour');
          const minElement = document.querySelector('.min');

          // Function to calculate the countdown
          function startCountdown(targetDate) {
          const countdown = setInterval(() => {
               const now = new Date().getTime();
               const distance = targetDate - now;
               
               // Time calculations for months, days, hours, and minutes
               const months = Math.floor(distance / (1000 * 60 * 60 * 24 * 30));
               const days = Math.floor((distance % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24));
               const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
               const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
               
               // Update the countdown display
               monthElement.textContent = months;
               dayElement.textContent = days;
               hourElement.textContent = hours;
               minElement.textContent = minutes;
               
               // If the countdown is over, stop the interval
               if (distance < 0) {
                    clearInterval(countdown);
                    monthElement.textContent = '0';
                    dayElement.textContent = '0';
                    hourElement.textContent = '0';
                    minElement.textContent = '0';
               }
          }, 1000);  // Update every second
          }

          // Set the target date (change this date as needed)
          const targetDate = new Date('November 25,2024').getTime();
          // const targetDate = new Date('November 15, 2024 20:24:00').getTime();

          // Start the countdown
          startCountdown(targetDate);

          // check date if its completed
          const now = new Date().getTime();
          if (now > targetDate) {
               document.querySelector('.coming').style.display = 'none';
               document.querySelector('.headText').textContent = 'Welcome to A New Beginning';
               setTimeout(() => {
                    window.location.href = '/page1/';
               }, 5000);
          }
      </script>
 </body>
 </html>
